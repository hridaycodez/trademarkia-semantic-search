version: "3.9"

services:
  semantic-search:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist the vector DB and models across container restarts
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - CACHE_THRESHOLD=0.85
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - MODELS_DIR=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
